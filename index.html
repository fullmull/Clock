<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clock | Minimalist Orbit Digital Clock</title>
    <meta name="description" content="A clean, glassmorphic digital clock with animated orbit rings. Minimalist design for a focused workspace.">
    <meta name="keywords" content="digital clock, orbit clock, minimalist clock, glassmorphism, online clock">
    <meta property="og:title" content="Clock">
    <meta property="og:description" content="Minimalist digital clock with orbit animations.">
    <meta property="og:url" content="https://www.orbitclock.online">
    <meta property="og:type" content="website">
    <meta property="og:image" content="https://www.orbitclock.online/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://www.orbitclock.online/" />
    <link id="favicon" rel="icon" type="image/png" href="">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="clock-container">
        <div id="orbit-ring"></div>
        <div id="time" title="Click for Settings | Double Click for Fullscreen">
            <span id="h">00</span><span class="colon">:</span><span id="m">00</span><span id="s-wrap"></span>
        </div>

        <div id="fade-controls">
            <div class="toggle-grid">
                <div class="label-left">12h</div>
                <label class="switch"><input type="checkbox" id="format-toggle"><span class="slider"></span></label>
                <div class="label-right">24h</div>

                <div class="label-left">Classic</div>
                <label class="switch"><input type="checkbox" id="layout-toggle"><span class="slider"></span></label>
                <div class="label-right">Stacked</div>
            </div>
            
            <div class="controls-divider">
                <div class="size-selector">
                    <label class="size-circle"><input type="radio" name="size-option" value="4rem"><span class="checkmark">S</span></label>
                    <label class="size-circle"><input type="radio" name="size-option" value="8rem"><span class="checkmark">M</span></label>
                    <label class="size-circle"><input type="radio" name="size-option" value="12rem"><span class="checkmark">L</span></label>
                    <label class="size-circle"><input type="radio" name="size-option" value="16rem"><span class="checkmark">XL</span></label>
                </div>
            </div>
        </div>
    </div>

    <div id="clock-settings" style="display: none;">
        <div id="settings-header">⠿ CUSTOMIZE</div>
        
        <div class="setting-row">
            <span>Dark/Light</span>
            <label class="switch"><input type="checkbox" id="theme-toggle"><span class="slider"></span></label>
        </div>

        <div class="setting-row">
            <span>Show Seconds</span>
            <label class="switch"><input type="checkbox" id="seconds-toggle" checked><span class="slider"></span></label>
        </div>

        <div class="setting-row">
            <span>Glow Effect</span>
            <label class="switch"><input type="checkbox" id="glow-toggle" checked><span class="slider"></span></label>
        </div>

        <div class="setting-row">
            <span>Rainbow Orbit</span>
            <label class="switch"><input type="checkbox" id="rainbow-orbit-toggle"><span class="slider"></span></label>
        </div>

        <div class="controls-divider" style="margin: 10px 0;"></div>

        <div class="setting-row">
            <span>Color:</span>
            <input type="color" id="color-picker">
        </div>
        <div class="setting-row">
            <span>Glow:</span>
            <input type="range" id="glow-slider" min="0" max="60" value="15">
        </div>
        
        <button id="close-settings-btn">DONE</button>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
